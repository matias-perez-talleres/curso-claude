<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VΛLTRON — Reference One</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:   #00f0ff;
  --mag:    #ff2d78;
  --green:  #39ff14;
  --amber:  #ffb800;
  --bg:     #060810;
  --card:   #0b0f1a;
  --border: rgba(0,240,255,0.1);
  --text:   #d0e4f8;
  --muted:  rgba(100,160,210,0.3);
  --gc:     rgba(0,240,255,0.5);
  --gm:     rgba(255,45,120,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 130% 70% at 25% 15%, rgba(0,60,100,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 90% 60% at 80% 85%, rgba(80,0,90,0.14) 0%, transparent 60%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  user-select: none;
}

/* subtle grain overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
  mix-blend-mode: overlay;
}

.app {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ══════════════════════════════ CABINET ══════════════════════════════ */
.cabinet {
  width: 580px;
  height: 370px;
  position: relative;
  overflow: hidden;
  border-radius: 5px 5px 0 0;
  background:
    linear-gradient(165deg, #111822 0%, #0a0e18 45%, #070a12 100%);
  border: 1px solid rgba(0,240,255,0.08);
  border-bottom: none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.025),
    0 40px 120px rgba(0,0,0,0.99);
  transition: box-shadow 0.9s ease;
}

/* brushed metal hairline texture */
.cabinet::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: repeating-linear-gradient(
    90deg,
    transparent 0, transparent 2px,
    rgba(255,255,255,0.006) 2px, rgba(255,255,255,0.006) 3px
  );
  pointer-events: none;
  z-index: 25;
}
/* top gloss sheen */
.cabinet::after {
  content: '';
  position: absolute; top:0; left:0; right:0;
  height: 38%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.022), transparent);
  border-radius: 5px 5px 0 0;
  pointer-events: none;
  z-index: 25;
}

/* playing state glow */
.cabinet.playing {
  box-shadow:
    0 0 0 1px rgba(0,240,255,0.18),
    0 40px 120px rgba(0,0,0,0.99),
    0 0 80px rgba(0,200,255,0.07),
    0 0 50px rgba(255,45,120,0.05);
}

/* ── LED edge strips ── */
.led-strip-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--cyan) 25%,
    var(--mag) 50%,
    var(--cyan) 75%,
    transparent 100%
  );
  opacity: 0.08;
  z-index: 27;
  transition: opacity 0.6s, box-shadow 0.6s;
}
.cabinet.playing .led-strip-bottom {
  opacity: 1;
  animation: ledPulse 2.5s ease-in-out infinite;
  box-shadow: 0 0 16px var(--cyan), 0 0 30px rgba(0,200,255,0.4);
}

.led-strip-left {
  position: absolute;
  left: 0; top:0; bottom:0;
  width: 1.5px;
  background: linear-gradient(to bottom, transparent, var(--cyan) 50%, transparent);
  opacity: 0.06;
  z-index: 27;
  transition: opacity 0.6s, box-shadow 0.6s;
}
.cabinet.playing .led-strip-left {
  opacity: 0.65;
  box-shadow: 0 0 12px var(--cyan);
}

.led-strip-right {
  position: absolute;
  right: 0; top:0; bottom:0;
  width: 1.5px;
  background: linear-gradient(to bottom, transparent, var(--mag) 50%, transparent);
  opacity: 0.06;
  z-index: 27;
  transition: opacity 0.6s, box-shadow 0.6s;
}
.cabinet.playing .led-strip-right {
  opacity: 0.65;
  box-shadow: 0 0 12px var(--mag);
}

@keyframes ledPulse {
  0%, 100% { opacity: 0.65; }
  50% { opacity: 1; }
}

/* ── Brand & model ── */
.brand {
  position: absolute;
  top: 13px; left: 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 7px;
  color: transparent;
  background: linear-gradient(110deg, var(--cyan) 0%, rgba(255,45,120,0.9) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  z-index: 30;
  text-shadow: none;
}
.cabinet.playing .brand {
  filter: drop-shadow(0 0 8px rgba(0,200,255,0.5));
}

.model-text {
  position: absolute;
  top: 41px; left: 22px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 3.5px;
  color: rgba(0,240,255,0.22);
  text-transform: uppercase;
  z-index: 30;
}

/* ── Status LED ── */
.led {
  position: absolute;
  top: 15px; right: 20px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #080c14;
  border: 1px solid rgba(255,255,255,0.06);
  z-index: 30;
  transition: background 0.35s, box-shadow 0.35s;
}
.led.on {
  background: var(--green);
  box-shadow: 0 0 14px var(--green), 0 0 6px rgba(57,255,20,0.85), 0 0 28px rgba(57,255,20,0.3);
  animation: ledBlink 2s ease-in-out infinite;
}
@keyframes ledBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.75; }
}

/* ── Corner detail ── */
.corner-dots {
  position: absolute;
  top: 12px; right: 35px;
  display: flex; gap: 4px;
  z-index: 30;
}
.corner-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(0,240,255,0.18);
}

/* ══════════════════════════════ PLATTER LED RING ══════════════════════════════ */
.platter-glow {
  position: absolute;
  width: 308px; height: 308px;
  border-radius: 50%;
  left: 61px; top: 39px;
  z-index: 1;
}

.platter-glow::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  border: 1.5px solid rgba(0,240,255,0.07);
  transition: border-color 0.8s, box-shadow 0.8s;
}
.platter-glow::after {
  content: '';
  position: absolute; inset: 8px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.02);
}

.cabinet.playing .platter-glow::before {
  border-color: rgba(0,240,255,0.45);
  box-shadow:
    0 0 22px rgba(0,220,255,0.35),
    0 0 50px rgba(0,200,255,0.15),
    inset 0 0 22px rgba(0,200,255,0.06);
  animation: ringBreath 3.2s ease-in-out infinite;
}

@keyframes ringBreath {
  0%, 100% {
    box-shadow: 0 0 18px rgba(0,220,255,0.3), 0 0 40px rgba(0,200,255,0.12), inset 0 0 18px rgba(0,200,255,0.04);
    border-color: rgba(0,240,255,0.35);
  }
  50% {
    box-shadow: 0 0 30px rgba(0,220,255,0.55), 0 0 70px rgba(0,200,255,0.22), 0 0 20px rgba(255,45,120,0.12), inset 0 0 25px rgba(0,200,255,0.08);
    border-color: rgba(0,240,255,0.65);
  }
}

/* ══════════════════════════════ PLATTER ══════════════════════════════ */
.platter {
  position: absolute;
  width: 282px; height: 282px;
  border-radius: 50%;
  left: 74px; top: 52px;
  background:
    radial-gradient(circle at 40% 35%, #161c28 0%, #0c1018 55%, #07080f 100%);
  box-shadow:
    0 18px 55px rgba(0,0,0,0.97),
    inset 0 0 0 4px rgba(255,255,255,0.018),
    inset 0 2px 4px rgba(255,255,255,0.035),
    inset 0 0 40px rgba(0,0,0,0.7);
  z-index: 2;
}
.platter::before {
  content: '';
  position: absolute; inset: 10px; border-radius: 50%;
  background:
    repeating-radial-gradient(circle at center,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 0.5px,
      transparent 0.5px,
      transparent 22px
    );
}

/* ══════════════════════════════ VINYL ══════════════════════════════ */
.vinyl {
  position: absolute;
  width: 258px; height: 258px;
  border-radius: 50%;
  left: 12px; top: 12px;
  background:
    repeating-radial-gradient(circle at center,
      #07090d 0px, #07090d 1.5px,
      #0f1218 1.5px, #0f1218 2.5px,
      #080b10 2.5px, #080b10 3px
    );
  animation: vinylSpin 1.85s linear infinite;
  animation-play-state: paused;
  z-index: 3;
}

.vinyl::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(circle at 33% 30%,
      rgba(0,180,255,0.06) 0%,
      rgba(180,0,255,0.04) 45%,
      transparent 65%
    );
  pointer-events: none;
  z-index: 1;
}
.cabinet.playing .vinyl::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  box-shadow: inset 0 0 35px rgba(0,180,255,0.05);
  pointer-events: none;
  z-index: 2;
}

@keyframes vinylSpin {
  to { transform: rotate(360deg); }
}

.vinyl-label {
  position: absolute;
  width: 30%; height: 30%;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background:
    radial-gradient(circle at 40% 35%, #0d1828 0%, #060d18 60%, #050a14 100%);
  border: 1px solid rgba(0,240,255,0.18);
  box-shadow:
    0 0 14px rgba(0,200,255,0.12),
    inset 0 0 10px rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  overflow: hidden;
  z-index: 4;
  transition: border-color 0.6s, box-shadow 0.6s;
}
.cabinet.playing .vinyl-label {
  border-color: rgba(0,240,255,0.55);
  box-shadow:
    0 0 22px rgba(0,200,255,0.45),
    0 0 10px rgba(255,45,120,0.15),
    inset 0 0 10px rgba(0,0,0,0.85);
}

.label-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 5.5px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: rgba(0,230,255,0.9);
  max-width: 92%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.5;
}
.label-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5px;
  letter-spacing: 2px;
  color: rgba(255,45,120,0.55);
  margin-top: 1px;
}

.spindle {
  position: absolute;
  width: 7px; height: 7px; border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle, #1a2030, #04060a);
  border: 1px solid rgba(255,255,255,0.05);
  z-index: 5;
  box-shadow: inset 0 1px 3px rgba(0,0,0,1);
}

/* ══════════════════════════════ SPECTRUM VISUALIZER ══════════════════════════════ */
.spectrum {
  position: absolute;
  right: 44px; bottom: 42px;
  display: flex;
  align-items: flex-end;
  gap: 2.5px;
  height: 52px;
  z-index: 8;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.cabinet.playing .spectrum { opacity: 1; }

.spec-bar {
  width: 3px;
  border-radius: 1.5px 1.5px 0 0;
  transform-origin: bottom center;
  animation: specDance var(--d, 0.8s) ease-in-out infinite alternate;
  background: linear-gradient(to top, var(--cyan), rgba(255,45,120,0.8));
  box-shadow: 0 0 4px rgba(0,200,255,0.5);
  height: calc(var(--h, 30) * 1px);
}

@keyframes specDance {
  from { transform: scaleY(0.12); opacity: 0.6; }
  to   { transform: scaleY(1);    opacity: 1; }
}

/* ══════════════════════════════ TONEARM ══════════════════════════════ */
.tonearm-pivot {
  position: absolute;
  width: 22px; height: 22px; border-radius: 50%;
  left: 413px; top: 51px;
  background: radial-gradient(circle at 38% 32%, #222a38 0%, #111620 55%, #090c14 100%);
  border: 1px solid rgba(0,240,255,0.18);
  box-shadow:
    0 6px 12px rgba(0,0,0,0.97),
    0 0 10px rgba(0,200,255,0.1),
    inset 0 1px 2px rgba(255,255,255,0.07);
  z-index: 10;
  transition: box-shadow 0.6s;
}
.cabinet.playing .tonearm-pivot {
  box-shadow:
    0 6px 12px rgba(0,0,0,0.97),
    0 0 18px rgba(0,200,255,0.3),
    inset 0 1px 2px rgba(255,255,255,0.07);
}
.tonearm-pivot::after {
  content: '';
  position: absolute;
  width: 6px; height: 6px; border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle, #2a3545, #0d1018);
  border: 1px solid rgba(0,240,255,0.12);
}

.tonearm {
  position: absolute;
  left: 416px; top: 62px;
  width: 16px; height: 162px;
  transform-origin: 50% 0%;
  transform: rotate(-35deg);
  transition: transform 0.9s cubic-bezier(0.38, 0.02, 0.18, 1.0);
  z-index: 9;
}
.tonearm.playing { transform: rotate(22deg); }

.arm-tube {
  position: absolute;
  left: 50%; top: 0;
  transform: translateX(-50%);
  width: 6px; height: 125px;
  background:
    linear-gradient(to right, #0d1018 0%, #1e2535 38%, #252e40 50%, #1a2030 65%, #0a0d14 100%);
  border-radius: 3px 3px 1px 1px;
  box-shadow:
    1px 2px 8px rgba(0,0,0,0.9),
    0 0 0 0.5px rgba(0,200,255,0.06);
  overflow: hidden;
}
.arm-tube::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px,
    transparent 1px, transparent 4px
  );
}
.arm-tube::after {
  content: '';
  position: absolute;
  left: 22%; top: 5%;
  width: 18%; height: 72%;
  background: rgba(0,200,255,0.06);
  border-radius: 2px;
}

.arm-headshell {
  position: absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-88%);
  width: 34px; height: 9px;
  background: linear-gradient(to bottom, #1c2535 0%, #10151e 100%);
  border: 0.5px solid rgba(0,200,255,0.14);
  border-radius: 3px 5px 5px 2px;
  box-shadow: 0 3px 7px rgba(0,0,0,0.9);
}
.arm-headshell::after {
  content: '';
  position: absolute;
  top: 1px; left: 3px;
  width: 58%; height: 3px;
  background: rgba(0,200,255,0.1);
  border-radius: 1px;
}

.arm-cartridge {
  position: absolute;
  bottom: 15px; left: 50%;
  transform: translateX(-140%);
  width: 13px; height: 12px;
  background: linear-gradient(to bottom, #181e2c, #0c1018);
  border: 0.5px solid rgba(0,200,255,0.15);
  border-radius: 1px 1px 3px 3px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.95);
  transition: border-color 0.5s, box-shadow 0.5s;
}
.tonearm.playing .arm-cartridge {
  border-color: rgba(0,240,255,0.5);
  box-shadow: 0 2px 5px rgba(0,0,0,0.95), 0 0 10px rgba(0,200,255,0.45);
}

.arm-needle {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-140%);
  width: 1.5px; height: 17px;
  background: linear-gradient(to bottom, rgba(0,200,255,0.35), var(--cyan));
  border-radius: 0 0 1px 1px;
  transition: box-shadow 0.5s;
}
.tonearm.playing .arm-needle {
  box-shadow: 0 0 10px var(--cyan), 0 0 5px rgba(0,240,255,0.85);
}

/* ══════════════════════════════ KNOBS ══════════════════════════════ */
.knob {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 30%, #1c2535 0%, #0a0c14 100%);
  border: 1px solid rgba(0,200,255,0.1);
  box-shadow:
    0 5px 12px rgba(0,0,0,0.97),
    inset 0 1px 2px rgba(255,255,255,0.04);
  z-index: 8;
}
.knob::before {
  content: '';
  position: absolute;
  top: 16%; left: 50%;
  transform: translateX(-50%);
  width: 1.5px; height: 28%;
  background: rgba(0,200,255,0.4);
  border-radius: 1px;
  box-shadow: 0 0 4px rgba(0,200,255,0.5);
}
.knob::after {
  content: attr(data-label);
  position: absolute;
  bottom: -15px; left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.5px;
  color: rgba(0,200,255,0.28);
  white-space: nowrap;
  text-transform: uppercase;
}
.knob-speed  { width: 38px; height: 38px; right: 100px; bottom: 26px; }
.knob-tone   { width: 32px; height: 32px; right: 50px;  bottom: 28px; }
.knob-bass   { width: 28px; height: 28px; right: 155px; bottom: 30px; }

/* ══════════════════════════════ CONTROLS PANEL ══════════════════════════════ */
.controls {
  width: 580px;
  background:
    linear-gradient(to bottom, #08101a, #060a12);
  border-radius: 0 0 7px 7px;
  padding: 15px 22px 20px;
  border: 1px solid rgba(0,240,255,0.07);
  border-top: none;
  box-shadow:
    0 30px 90px rgba(0,0,0,0.97),
    inset 0 0 0 0.5px rgba(255,255,255,0.015);
  position: relative;
}

.controls::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 1px;
  background: linear-gradient(to right,
    transparent,
    rgba(0,240,255,0.4) 30%,
    rgba(255,45,120,0.4) 70%,
    transparent
  );
  opacity: 0.35;
}

.track-info {
  text-align: center;
  margin-bottom: 11px;
}
.track-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: #deeeff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  text-transform: uppercase;
}
.track-artist {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: rgba(0,200,255,0.33);
  letter-spacing: 2.5px;
  margin-top: 3px;
  text-transform: uppercase;
}

.progress-wrap {
  position: relative;
  height: 3px;
  background: rgba(0,240,255,0.05);
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 6px;
  overflow: visible;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(to right, var(--cyan), var(--mag));
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
  transition: width 0.2s linear;
  position: relative;
  box-shadow: 0 0 8px rgba(0,200,255,0.5);
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -4px; top: 50%;
  transform: translateY(-50%);
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 12px var(--cyan), 0 0 6px rgba(0,240,255,0.9);
  opacity: 0;
  transition: opacity 0.25s;
}
.progress-wrap:hover .progress-fill::after { opacity: 1; }

.progress-times {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1px;
  color: rgba(0,200,255,0.28);
  margin-bottom: 12px;
}

.btn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
}

.btn {
  background: rgba(0,240,255,0.03);
  border: 1px solid rgba(0,240,255,0.1);
  color: rgba(0,200,255,0.42);
  cursor: pointer;
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s, border-color 0.15s;
}
.btn:hover {
  color: var(--cyan);
  background: rgba(0,240,255,0.09);
  border-color: rgba(0,240,255,0.35);
  box-shadow: 0 0 16px rgba(0,200,255,0.2);
}
.btn:active { transform: scale(0.88); }

.btn-play {
  width: 54px; height: 54px;
  font-size: 19px;
  background: transparent;
  border: 1.5px solid var(--cyan);
  color: var(--cyan);
  box-shadow:
    0 0 22px rgba(0,200,255,0.2),
    inset 0 0 22px rgba(0,200,255,0.05);
  position: relative;
  overflow: hidden;
}
.btn-play::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(0,200,255,0.18) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 50%;
}
.btn-play:hover::before { opacity: 1; }
.btn-play:hover {
  color: #fff;
  border-color: var(--cyan);
  box-shadow:
    0 0 34px rgba(0,200,255,0.45),
    0 0 65px rgba(0,200,255,0.18),
    inset 0 0 22px rgba(0,200,255,0.12);
  transform: scale(1.06);
}

.vol-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 13px;
  font-size: 13px;
  color: rgba(0,200,255,0.28);
}
input[type=range].vol {
  -webkit-appearance: none;
  width: 120px; height: 2px;
  background: rgba(0,240,255,0.09);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}
input[type=range].vol::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,200,255,0.75), 0 0 4px rgba(0,240,255,0.9);
  border: 1px solid rgba(255,255,255,0.25);
}

.src-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.src-tab {
  padding: 4px 13px;
  border-radius: 2px;
  border: 1px solid rgba(0,240,255,0.09);
  background: transparent;
  color: rgba(0,200,255,0.28);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.src-tab.active {
  background: rgba(0,240,255,0.07);
  border-color: rgba(0,240,255,0.38);
  color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,200,255,0.14);
}
.src-tab:hover:not(.active) {
  border-color: rgba(0,240,255,0.2);
  color: rgba(0,200,255,0.5);
}

.src-pane { display: none; }
.src-pane.active {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.url-input {
  flex: 1; min-width: 0;
  background: rgba(0,8,18,0.85);
  border: 1px solid rgba(0,240,255,0.1);
  color: rgba(0,230,255,0.8);
  padding: 6px 10px;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.url-input:focus {
  border-color: rgba(0,240,255,0.38);
  box-shadow: 0 0 12px rgba(0,200,255,0.1);
}
.url-input::placeholder { color: rgba(0,200,255,0.13); }

.action-btn {
  padding: 6px 14px;
  background: rgba(0,240,255,0.05);
  border: 1px solid rgba(0,240,255,0.24);
  color: var(--cyan);
  border-radius: 2px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  text-transform: uppercase;
}
.action-btn:hover {
  background: rgba(0,240,255,0.12);
  box-shadow: 0 0 16px rgba(0,200,255,0.22);
}

.file-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1px;
  color: rgba(0,200,255,0.22);
}

.playlist {
  max-height: 110px;
  overflow-y: auto;
  margin-top: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,200,255,0.14) transparent;
}
.playlist::-webkit-scrollbar { width: 2px; }
.playlist::-webkit-scrollbar-thumb {
  background: rgba(0,200,255,0.18);
  border-radius: 1px;
}

.pl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  color: rgba(0,200,255,0.28);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  border-left: 2px solid transparent;
}
.pl-item:hover {
  background: rgba(0,240,255,0.04);
  color: rgba(0,220,255,0.65);
  border-left-color: rgba(0,240,255,0.28);
}
.pl-item.active {
  background: rgba(0,240,255,0.065);
  color: var(--cyan);
  border-left-color: var(--cyan);
  box-shadow: inset 0 0 20px rgba(0,200,255,0.04);
}
.pl-num { width: 18px; text-align: right; color: rgba(0,200,255,0.18); flex-shrink: 0; }
.pl-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.pl-dur {
  margin-left: auto; flex-shrink: 0;
  color: rgba(0,200,255,0.18);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
}

.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(8,4,12,0.9);
  color: var(--mag);
  padding: 10px 20px;
  border-radius: 2px;
  border: 1px solid rgba(255,45,120,0.3);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  backdrop-filter: blur(16px);
  box-shadow: 0 0 24px rgba(255,45,120,0.18);
  transition: transform 0.35s cubic-bezier(0.22, 0.8, 0.32, 1);
  z-index: 999;
  pointer-events: none;
}
.toast.visible { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">

  <!-- ══ CABINET ══ -->
  <div class="cabinet" id="cabinet">

    <div class="brand">VΛLTRON</div>
    <div class="model-text">Reference One · Turntable</div>
    <div class="led" id="led"></div>

    <div class="corner-dots">
      <div class="corner-dot"></div>
      <div class="corner-dot"></div>
      <div class="corner-dot"></div>
    </div>

    <!-- LED edge strips -->
    <div class="led-strip-bottom"></div>
    <div class="led-strip-left"></div>
    <div class="led-strip-right"></div>

    <!-- Platter LED ring -->
    <div class="platter-glow"></div>

    <!-- Platter + Vinyl -->
    <div class="platter">
      <div class="vinyl" id="vinyl">
        <div class="vinyl-label" id="vinylLabel">
          <div class="label-title" id="labelTitle">Sin pista</div>
          <div class="label-brand">Vλltron</div>
        </div>
        <div class="spindle"></div>
      </div>
    </div>

    <!-- Spectrum visualizer -->
    <div class="spectrum" id="spectrum"></div>

    <!-- Tonearm -->
    <div class="tonearm-pivot"></div>
    <div class="tonearm" id="tonearm">
      <div class="arm-tube"></div>
      <div class="arm-headshell"></div>
      <div class="arm-cartridge"></div>
      <div class="arm-needle"></div>
    </div>

    <!-- Decorative knobs -->
    <div class="knob knob-speed" data-label="33⅓"></div>
    <div class="knob knob-bass"  data-label="Bass"></div>
    <div class="knob knob-tone"  data-label="Tone"></div>
  </div>

  <!-- ══ CONTROLS ══ -->
  <div class="controls">
    <div class="track-info">
      <div class="track-title" id="trackTitle">Selecciona una canción</div>
      <div class="track-artist" id="trackArtist">—</div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-times">
      <span id="curTime">0:00</span>
      <span id="totTime">0:00</span>
    </div>

    <div class="btn-row">
      <button class="btn" id="prevBtn" title="Anterior">⏮</button>
      <button class="btn btn-play" id="playBtn" title="Reproducir">▶</button>
      <button class="btn" id="nextBtn" title="Siguiente">⏭</button>
    </div>

    <div class="vol-row">
      🔈
      <input type="range" class="vol" id="volSlider" min="0" max="100" value="80">
      🔊
    </div>

    <div class="src-tabs">
      <button class="src-tab active" data-src="local">Archivos locales</button>
      <button class="src-tab" data-src="online">URL online</button>
    </div>

    <div class="src-pane active" id="paneLocal">
      <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">
      <button class="action-btn" onclick="document.getElementById('fileInput').click()">
        Abrir archivos
      </button>
      <span class="file-lbl" id="fileCountLbl">Sin archivos</span>
    </div>

    <div class="src-pane" id="paneOnline">
      <input type="text" class="url-input" id="urlInput"
             placeholder="URL directa de audio  (mp3, ogg, aac…)">
      <button class="action-btn" id="loadUrlBtn">Cargar</button>
    </div>

    <div class="playlist" id="playlist"></div>
  </div>

</div>

<div class="toast" id="toast"></div>
<audio id="audio"></audio>

<script>
// ─── Spectrum bars ────────────────────────────────────
const specEl = document.getElementById('spectrum');
const barData = [
  { h: 22, d: 0.70 }, { h: 36, d: 0.92 }, { h: 18, d: 0.62 },
  { h: 44, d: 1.10 }, { h: 29, d: 0.80 }, { h: 52, d: 0.74 },
  { h: 16, d: 0.98 }, { h: 40, d: 0.65 }, { h: 47, d: 0.94 },
  { h: 20, d: 0.72 }, { h: 34, d: 0.86 }, { h: 50, d: 0.61 },
  { h: 26, d: 1.02 }, { h: 42, d: 0.76 }, { h: 18, d: 0.88 },
  { h: 31, d: 0.66 }, { h: 45, d: 0.82 }, { h: 22, d: 1.06 },
  { h: 38, d: 0.70 }, { h: 15, d: 0.91 },
];
barData.forEach(({ h, d }, i) => {
  const bar = document.createElement('div');
  bar.className = 'spec-bar';
  bar.style.setProperty('--h', h);
  bar.style.setProperty('--d', d + 's');
  bar.style.animationDelay = (i * 0.045) + 's';
  specEl.appendChild(bar);
});

// ─── State ───────────────────────────────────────────
const audio      = document.getElementById('audio');
let   playlist   = [];
let   currentIdx = -1;
let   isPlaying  = false;

// ─── Elements ────────────────────────────────────────
const vinyl        = document.getElementById('vinyl');
const tonearm      = document.getElementById('tonearm');
const led          = document.getElementById('led');
const cabinet      = document.getElementById('cabinet');
const playBtn      = document.getElementById('playBtn');
const prevBtn      = document.getElementById('prevBtn');
const nextBtn      = document.getElementById('nextBtn');
const volSlider    = document.getElementById('volSlider');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const curTimeEl    = document.getElementById('curTime');
const totTimeEl    = document.getElementById('totTime');
const trackTitle   = document.getElementById('trackTitle');
const trackArtist  = document.getElementById('trackArtist');
const labelTitle   = document.getElementById('labelTitle');
const fileInput    = document.getElementById('fileInput');
const fileCountLbl = document.getElementById('fileCountLbl');
const urlInput     = document.getElementById('urlInput');
const loadUrlBtn   = document.getElementById('loadUrlBtn');
const playlistEl   = document.getElementById('playlist');
const toast        = document.getElementById('toast');

// ─── Utilities ───────────────────────────────────────
function fmtTime(s) {
  if (!isFinite(s) || s < 0) return '—';
  const m  = Math.floor(s / 60);
  const ss = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${ss}`;
}

let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), 3500);
}

// ─── Playback state ──────────────────────────────────
function setPlaying(state) {
  isPlaying = state;
  vinyl.style.animationPlayState = state ? 'running' : 'paused';
  tonearm.classList.toggle('playing', state);
  led.classList.toggle('on', state);
  cabinet.classList.toggle('playing', state);
  playBtn.textContent = state ? '⏸' : '▶';
  playBtn.title       = state ? 'Pausar' : 'Reproducir';
}

// ─── Track info ──────────────────────────────────────
function updateInfo(item) {
  if (!item) {
    trackTitle.textContent  = 'Selecciona una canción';
    trackArtist.textContent = '—';
    labelTitle.textContent  = 'Sin pista';
    return;
  }
  const name = item.name.replace(/\.[^.]+$/, '');
  trackTitle.textContent  = name;
  trackArtist.textContent = item.artist || 'Pista de audio';
  labelTitle.textContent  = name;
}

// ─── Playlist rendering ──────────────────────────────
function renderPlaylist() {
  playlistEl.innerHTML = '';
  playlist.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'pl-item' + (i === currentIdx ? ' active' : '');
    d.innerHTML = `
      <span class="pl-num">${i + 1}</span>
      <span class="pl-name">${item.name.replace(/\.[^.]+$/, '')}</span>
      <span class="pl-dur">${item.duration ? fmtTime(item.duration) : '—'}</span>
    `;
    d.addEventListener('click', () => loadTrack(i, true));
    playlistEl.appendChild(d);
    if (i === currentIdx) d.scrollIntoView({ block: 'nearest' });
  });
}

// ─── Load & play ─────────────────────────────────────
function loadTrack(idx, autoPlay = true) {
  if (idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  const item = playlist[idx];

  audio.src = item.src;
  audio.load();
  updateInfo(item);
  renderPlaylist();

  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  curTimeEl.textContent = '0:00';
  totTimeEl.textContent = item.duration ? fmtTime(item.duration) : '—';

  if (autoPlay) {
    audio.play()
      .then(() => setPlaying(true))
      .catch(err => {
        setPlaying(false);
        if (err.name !== 'AbortError') showToast('No se pudo reproducir el audio.');
      });
  } else {
    setPlaying(false);
  }
}

// ─── Controls ────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (playlist.length === 0) return;
  if (currentIdx < 0) { loadTrack(0); return; }
  if (isPlaying) {
    audio.pause();
    setPlaying(false);
  } else {
    audio.play()
      .then(() => setPlaying(true))
      .catch(() => showToast('No se pudo reproducir el audio.'));
  }
});

prevBtn.addEventListener('click', () => {
  if (!playlist.length) return;
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
  } else {
    loadTrack(currentIdx <= 0 ? playlist.length - 1 : currentIdx - 1);
  }
});

nextBtn.addEventListener('click', () => {
  if (!playlist.length) return;
  loadTrack((currentIdx + 1) % playlist.length);
});

volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
});
audio.volume = 0.8;

// ─── Progress bar ────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration || !isFinite(audio.duration)) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.transition = 'width 0.2s linear';
  progressFill.style.width = pct + '%';
  curTimeEl.textContent = fmtTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  totTimeEl.textContent = fmtTime(audio.duration);
  if (currentIdx >= 0 && isFinite(audio.duration)) {
    playlist[currentIdx].duration = audio.duration;
    renderPlaylist();
  }
});

audio.addEventListener('ended', () => {
  const next = (currentIdx + 1) % playlist.length;
  loadTrack(next);
});

audio.addEventListener('error', () => {
  setPlaying(false);
  showToast('Error: no se pudo cargar el audio.');
});

progressWrap.addEventListener('click', (e) => {
  if (!audio.duration || !isFinite(audio.duration)) return;
  const rect = progressWrap.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

// ─── Local files ─────────────────────────────────────
fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  if (!files.length) return;

  playlist.forEach(item => {
    if (item.src.startsWith('blob:')) URL.revokeObjectURL(item.src);
  });

  playlist = files.map(f => ({
    name:     f.name,
    src:      URL.createObjectURL(f),
    artist:   null,
    duration: null,
  }));

  currentIdx = -1;
  fileCountLbl.textContent = `${files.length} archivo${files.length !== 1 ? 's' : ''}`;
  renderPlaylist();
  updateInfo(null);
  setPlaying(false);
  audio.src = '';
  curTimeEl.textContent = '0:00';
  totTimeEl.textContent = '0:00';
  progressFill.style.width = '0%';

  loadTrack(0, false);
});

// ─── Online URL ──────────────────────────────────────
function loadUrl() {
  const url = urlInput.value.trim();
  if (!url) { showToast('Pega una URL de audio válida.'); return; }

  const parts = url.split('/');
  const raw   = parts[parts.length - 1].split('?')[0];
  const name  = decodeURIComponent(raw) || 'Audio online';

  playlist.forEach(item => {
    if (item.src.startsWith('blob:')) URL.revokeObjectURL(item.src);
  });

  playlist    = [{ name, src: url, artist: 'Fuente online', duration: null }];
  currentIdx  = -1;
  renderPlaylist();
  loadTrack(0, true);
}
loadUrlBtn.addEventListener('click', loadUrl);
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadUrl(); });

// ─── Source tabs ─────────────────────────────────────
document.querySelectorAll('.src-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.src-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.src-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const id = 'pane' + tab.dataset.src.charAt(0).toUpperCase() + tab.dataset.src.slice(1);
    document.getElementById(id).classList.add('active');
  });
});

// ─── Keyboard shortcuts ──────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space')      { e.preventDefault(); playBtn.click(); }
  if (e.code === 'ArrowRight') nextBtn.click();
  if (e.code === 'ArrowLeft')  prevBtn.click();
});
</script>
</body>
</html>
